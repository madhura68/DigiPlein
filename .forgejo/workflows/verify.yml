name: verify

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # `next build` genereert next-env.d.ts (gitignored) dat de typecheck in
      # `verify` nodig heeft voor de CSS-side-effect-import in app/layout.tsx.
      - run: npm run build
      - run: npm run verify
